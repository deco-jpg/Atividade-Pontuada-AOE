version: '3.8'

services:
  # Serviço do Banco de Dados MySQL
  mysql-db:
    image: mysql:8.0
    container_name: mysql-back-end-aoe
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" # Permite a senha em branco que você usa
      MYSQL_DATABASE: projetoAOE
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: