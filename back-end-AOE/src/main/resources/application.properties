spring.application.name=back-end-AOE

# ConfiguraÁıes de Conex„o com o Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/projetoAOE?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ConfiguraÁıes do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect